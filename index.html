            border-radius: 10px;
        }

        .modal-resumo::-webkit-scrollbar-thumb {
            background: #ff4444;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="background-icons">
        <div class="film-icon">🎬</div>
        <div class="film-icon">🎥</div>
        <div class="film-icon">🍿</div>
        <div class="film-icon">🎞️</div>
        <div class="film-icon">📽️</div>
        <div class="film-icon">🎦</div>
        <div class="film-icon">🎫</div>
        <div class="film-icon">🎪</div>
        <div class="film-icon">🎭</div>
        <div class="film-icon">🎟️</div>
        <div class="film-icon">📀</div>
        <div class="film-icon">💿</div>
        <div class="film-icon">📺</div>
        <div class="film-icon">📼</div>
        <div class="film-icon">🔴</div>
    </div>

    <header class="header">
        <div class="header-content">
            <div class="logo">🎬 CineStream</div>
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar filmes por título...">
                    <i>🔍</i>
                </div>
            </div>
        </div>
    </header>

    <div class="header-spacer"></div>

    <main class="main">
        <div id="loading" class="loading">Carregando filmes... 🎬</div>
        <div id="error" class="error-message" style="display: none;"></div>
        
        <div id="movieSections" style="display: none;">
            <section class="movie-section">
                <h2 class="section-title">🎬 Destaques da Semana</h2>
                <div class="movies-scroll-container" id="scrollContainerLeft">
                    <div class="movies-track animating-left" id="trackLeft"></div>
                </div>
            </section>

            <section class="movie-section">
                <h2 class="section-title">🍿 Recomendados para Você</h2>
                <div class="movies-scroll-container" id="scrollContainerRight">
                    <div class="movies-track animating-right" id="trackRight"></div>
                </div>
            </section>
        </div>
    </main>

    <div class="modal" id="movieModal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-movie" id="modalMovieContent"></div>
        </div>
    </div>

    <div class="player-modal" id="playerModal">
        <div class="player-content">
            <div class="player-header visible" id="playerHeader">
                <h3 id="playerTitle">Carregando...</h3>
                <span class="close-player" onclick="closePlayer()">Fechar ✕</span>
            </div>
            <div class="player-control-btn pulse" id="playerControlBtn" onclick="togglePlayerHeader(event)">
                <i>⚙️</i>
            </div>
            <div class="player-frame-container" id="playerFrameContainer">
                <!-- O iframe será inserido dinamicamente aqui -->
            </div>
        </div>
    </div>

    <script>
        // SUA URL DO JSON ATUALIZADA
        const JSON_URL = 'https://raw.githubusercontent.com/IgoSimplicio/filmes.json/refs/heads/main/filmes.json';
        
        let movies = [];
        let allMovies = [];

        // Elementos do DOM
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const movieSections = document.getElementById('movieSections');
        const trackLeft = document.getElementById('trackLeft');
        const trackRight = document.getElementById('trackRight');
        const scrollContainerLeft = document.getElementById('scrollContainerLeft');
        const scrollContainerRight = document.getElementById('scrollContainerRight');
        const searchInput = document.getElementById('searchInput');
        const movieModal = document.getElementById('movieModal');
        const modalMovieContent = document.getElementById('modalMovieContent');
        const playerModal = document.getElementById('playerModal');
        const playerTitle = document.getElementById('playerTitle');
        const playerHeader = document.getElementById('playerHeader');
        const playerControlBtn = document.getElementById('playerControlBtn');
        const playerFrameContainer = document.getElementById('playerFrameContainer');
        
        let currentIframe = null;

        // Variáveis para controle do player
        let headerTimeout;
        let isHeaderVisible = true;

        // Função de escape para JavaScript (corrige o problema do apóstrofo)
        function escapeJsString(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\')
                      .replace(/'/g, "\\'")
                      .replace(/"/g, '\\"')
                      .replace(/`/g, '\\`')
                      .replace(/\$/g, '\\$');
        }

        // Função de escape para HTML
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Função para detectar se o conteúdo é um iframe embed
        function isIframeEmbed(content) {
            if (!content) return false;
            const trimmed = content.trim();
            return trimmed.startsWith('<iframe') && trimmed.includes('</iframe>');
        }

        // Função para extrair o código iframe completo e injetar diretamente
        function extractAndInjectIframe(iframeCode, container) {
            // Limpar container
            container.innerHTML = '';
            
            // Criar um div temporário para parsear o iframe
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = iframeCode;
            
            // Pegar o iframe do HTML parseado
            const iframe = tempDiv.querySelector('iframe');
            
            if (iframe) {
                // Clonar o iframe com todos os atributos
                const newIframe = document.createElement('iframe');
                
                // Copiar todos os atributos do iframe original
                for (let i = 0; i < iframe.attributes.length; i++) {
                    const attr = iframe.attributes[i];
                    newIframe.setAttribute(attr.name, attr.value);
                }
                
                // Garantir que o iframe ocupe toda a tela
                newIframe.style.width = '100%';
                newIframe.style.height = '100%';
                newIframe.style.border = 'none';
                newIframe.className = 'player-frame';
                
                // Adicionar ao container
                container.appendChild(newIframe);
                currentIframe = newIframe;
                
                console.log('Iframe embed injetado com sucesso');
                return true;
            }
            
            return false;
        }

        // Função para criar iframe a partir de URL
        function createIframeFromUrl(url) {
            const iframe = document.createElement('iframe');
            iframe.className = 'player-frame';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.setAttribute('allowfullscreen', '');
            iframe.setAttribute('allow', 'autoplay; fullscreen; payment; accelerometer; camera; gyroscope; magnetometer; microphone; midi; web-share');
            
            // Normalizar URL
            let normalizedUrl = url.trim();
            if (!normalizedUrl.startsWith('http://') && !normalizedUrl.startsWith('https://')) {
                normalizedUrl = 'https://' + normalizedUrl;
            }
            iframe.src = normalizedUrl;
            
            return iframe;
        }

        // Função para carregar conteúdo no player
        function loadInPlayer(content, title) {
            // Limpar container
            playerFrameContainer.innerHTML = '';
            
            let success = false;
            
            // Verificar se é iframe embed
            if (isIframeEmbed(content)) {
                success = extractAndInjectIframe(content, playerFrameContainer);
            }
            
            // Se não for embed ou falhou ao extrair, tratar como URL
            if (!success) {
                const iframe = createIframeFromUrl(content);
                playerFrameContainer.appendChild(iframe);
                currentIframe = iframe;
            }
            
            // Atualizar título
            playerTitle.textContent = `Carregando: ${title}`;
            
            // Evento de load para o iframe
            if (currentIframe) {
                currentIframe.onload = function() {
                    playerTitle.textContent = `Assistindo: ${title}`;
                };
                
                currentIframe.onerror = function() {
                    playerTitle.textContent = `Erro ao carregar: ${title}`;
                };
            }
            
            // Resetar estado do cabeçalho
            playerHeader.classList.remove('hidden');
            playerHeader.classList.add('visible');
            isHeaderVisible = true;
            playerControlBtn.classList.remove('pulse');
            
            // Iniciar timer de 3 segundos
            startHeaderTimer();
        }

        // Função para iniciar timer do cabeçalho
        function startHeaderTimer() {
            if (headerTimeout) {
                clearTimeout(headerTimeout);
            }
            
            headerTimeout = setTimeout(() => {
                if (playerHeader.classList.contains('visible')) {
                    playerHeader.classList.remove('visible');
                    playerHeader.classList.add('hidden');
                    isHeaderVisible = false;
                    playerControlBtn.classList.add('pulse');
                }
            }, 3000);
        }

        // Variáveis para controle de drag e timeout
        let isDragging = false;
        let startX;
        let scrollLeft;
        let animationTimeouts = {
            left: null,
            right: null
        };
        
        // Variável para controlar se está em modo de pesquisa
        let isSearching = false;

        // Função para pausar animação
        function pauseAnimation(track, containerId) {
            track.classList.add('paused');
            
            const direction = containerId === 'scrollContainerLeft' ? 'left' : 'right';
            if (animationTimeouts[direction]) {
                clearTimeout(animationTimeouts[direction]);
            }
        }

        // Função para retomar animação após 5 segundos
        function scheduleResumeAnimation(track, containerId) {
            if (isSearching) return;
            
            const direction = containerId === 'scrollContainerLeft' ? 'left' : 'right';
            
            if (animationTimeouts[direction]) {
                clearTimeout(animationTimeouts[direction]);
            }
            
            animationTimeouts[direction] = setTimeout(() => {
                track.classList.remove('paused');
                if (direction === 'left') {
                    track.classList.add('animating-left');
                } else {
                    track.classList.add('animating-right');
                }
                animationTimeouts[direction] = null;
            }, 5000);
        }

        // Função para parar completamente as animações (modo pesquisa)
        function stopAllAnimations() {
            trackLeft.classList.add('stopped');
            trackLeft.classList.remove('animating-left', 'animating-right', 'paused');
            trackRight.classList.add('stopped');
            trackRight.classList.remove('animating-left', 'animating-right', 'paused');
            
            if (animationTimeouts.left) {
                clearTimeout(animationTimeouts.left);
                animationTimeouts.left = null;
            }
            if (animationTimeouts.right) {
                clearTimeout(animationTimeouts.right);
                animationTimeouts.right = null;
            }
        }

        // Função para restaurar animações (sair do modo pesquisa)
        function restoreAnimations() {
            trackLeft.classList.remove('stopped');
            trackRight.classList.remove('stopped');
            trackLeft.classList.add('animating-left');
            trackRight.classList.add('animating-right');
        }

        // Função para inicializar drag em um container
        function initDragScroll(container, track) {
            container.addEventListener('mousedown', (e) => {
                if (isSearching) return;
                
                isDragging = true;
                container.style.cursor = 'grabbing';
                startX = e.pageX - container.offsetLeft;
                scrollLeft = container.scrollLeft;
                
                pauseAnimation(track, container.id);
            });

            container.addEventListener('mouseleave', () => {
                if (isDragging && !isSearching) {
                    isDragging = false;
                    container.style.cursor = 'grab';
                    scheduleResumeAnimation(track, container.id);
                }
            });

            container.addEventListener('mouseup', () => {
                if (isDragging && !isSearching) {
                    isDragging = false;
                    container.style.cursor = 'grab';
                    scheduleResumeAnimation(track, container.id);
                }
            });

            container.addEventListener('mousemove', (e) => {
                if (!isDragging || isSearching) return;
                e.preventDefault();
                
                const x = e.pageX - container.offsetLeft;
                const walk = (x - startX) * 1.5;
                container.scrollLeft = scrollLeft - walk;
            });

            container.addEventListener('touchstart', (e) => {
                if (isSearching) return;
                
                isDragging = true;
                startX = e.touches[0].pageX - container.offsetLeft;
                scrollLeft = container.scrollLeft;
                
                pauseAnimation(track, container.id);
            });

            container.addEventListener('touchend', () => {
                if (isDragging && !isSearching) {
                    isDragging = false;
                    scheduleResumeAnimation(track, container.id);
                }
            });

            container.addEventListener('touchmove', (e) => {
                if (!isDragging || isSearching) return;
                e.preventDefault();
                
                const x = e.touches[0].pageX - container.offsetLeft;
                const walk = (x - startX) * 1.5;
                container.scrollLeft = scrollLeft - walk;
            });

            container.querySelectorAll('.movie-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (isDragging) {
                        e.preventDefault();
                        e.stopPropagation();
                    }
                });
            });
        }

        // Função para controlar o cabeçalho do player
        function setupPlayerControls() {
            window.togglePlayerHeader = function(event) {
                if (event) event.stopPropagation();
                
                const icon = playerControlBtn.querySelector('i');
                playerControlBtn.classList.add('rotate');
                
                setTimeout(() => {
                    playerControlBtn.classList.remove('rotate');
                }, 500);
                
                if (isHeaderVisible) {
                    playerHeader.classList.remove('visible');
                    playerHeader.classList.add('hidden');
                    isHeaderVisible = false;
                    if (headerTimeout) {
                        clearTimeout(headerTimeout);
                    }
                    playerControlBtn.classList.add('pulse');
                } else {
                    playerHeader.classList.remove('hidden');
                    playerHeader.classList.add('visible');
                    isHeaderVisible = true;
                    playerControlBtn.classList.remove('pulse');
                    startHeaderTimer();
                }
            };

            window.watchMovie = function(stremLink, titulo) {
                loadInPlayer(stremLink, titulo);
                playerModal.style.display = 'block';
                if (movieModal.style.display === 'flex') {
                    movieModal.style.display = 'none';
                }
                document.body.style.overflow = 'hidden';
            };

            window.closePlayer = function() {
                playerModal.style.display = 'none';
                if (currentIframe) {
                    currentIframe.src = '';
                    currentIframe = null;
                }
                playerFrameContainer.innerHTML = '';
                document.body.style.overflow = 'auto';
                if (headerTimeout) {
                    clearTimeout(headerTimeout);
                }
                playerControlBtn.classList.remove('pulse', 'rotate');
            };
        }

        // Função para carregar filmes da URL
        async function loadMovies() {
            try {
                loadingEl.style.display = 'block';
                errorEl.style.display = 'none';
                movieSections.style.display = 'none';

                console.log('Carregando filmes de:', JSON_URL);
                
                const response = await fetch(JSON_URL + '?t=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                if (!data.filmes || !Array.isArray(data.filmes)) {
                    throw new Error('Formato de JSON inválido. Deve conter um array "filmes"');
                }

                movies = data.filmes;
                allMovies = [...movies];

                if (movies.length === 0) {
                    throw new Error('Nenhum filme encontrado');
                }

                const duplicatedMovies = [...movies, ...movies, ...movies, ...movies, ...movies];

                renderMovieTrack(trackLeft, duplicatedMovies);
                renderMovieTrack(trackRight, duplicatedMovies);

                setTimeout(() => {
                    initDragScroll(scrollContainerLeft, trackLeft);
                    initDragScroll(scrollContainerRight, trackRight);
                }, 100);

                loadingEl.style.display = 'none';
                movieSections.style.display = 'block';

            } catch (error) {
                console.error('Erro detalhado:', error);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = `
                    <h3>❌ Erro ao carregar filmes</h3>
                    <p>${error.message}</p>
                    <p>URL tentada: <strong>${JSON_URL}</strong></p>
                    <p>Verifique se o arquivo JSON está correto e as aspas estão escapadas corretamente.</p>
                    <button class="retry-btn" onclick="loadMovies()">Tentar novamente</button>
                `;
            }
        }

        function renderMovieTrack(trackElement, moviesToRender) {
            trackElement.innerHTML = moviesToRender.map(movie => `
                <div class="movie-card" onclick="showMovieDetails(${movie.id})">
                    <img class="movie-poster" src="${escapeHtml(movie.capa)}" alt="${escapeHtml(movie.titulo)}" loading="lazy" 
                         onerror="this.src='https://via.placeholder.com/200x300?text=Erro+na+imagem'">
                    <div class="movie-title">${escapeHtml(movie.titulo)}</div>
                </div>
            `).join('');
        }

        window.showMovieDetails = function(movieId) {
            const movie = allMovies.find(m => m.id === movieId);
            const isMobile = window.innerWidth < 768;
            
            // Escapar corretamente para o onclick (usando escapeJsString)
            const escapedLink = escapeJsString(movie.stremLink);
            const escapedTitle = escapeJsString(movie.titulo);
            
            modalMovieContent.innerHTML = `
                <div class="modal-poster-container">
                    <img class="modal-poster" src="${escapeHtml(movie.capa)}" alt="${escapeHtml(movie.titulo)}" loading="lazy"
                         onerror="this.src='https://via.placeholder.com/250x350?text=Erro'">
                    ${isMobile ? `
                        <button class="modal-watch-btn-mobile" onclick="watchMovie('${escapedLink}', '${escapedTitle}')">
                            🎬 Assistir Agora
                        </button>
                    ` : ''}
                </div>
                <div class="modal-info">
                    <h2 class="modal-title">${escapeHtml(movie.titulo)}</h2>
                    <div class="modal-meta">
                        <span>${escapeHtml(movie.ano)}</span>
                        <span>${escapeHtml(movie.duracao)}</span>
                    </div>
                    <p class="modal-resumo">${escapeHtml(movie.resumo)}</p>
                    ${!isMobile ? `
                        <button class="modal-watch-btn-desktop" onclick="watchMovie('${escapedLink}', '${escapedTitle}')">
                            🎬 Assistir Agora
                        </button>
                    ` : ''}
                </div>
            `;
            
            movieModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = function() {
            movieModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        window.addEventListener('popstate', function() {
            if (playerModal.style.display === 'block') {
                closePlayer();
            } else if (movieModal.style.display === 'flex') {
                closeModal();
            }
        });

        function searchMovies() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            
            if (searchTerm === '') {
                isSearching = false;
                restoreAnimations();
                const duplicatedMovies = [...allMovies, ...allMovies, ...allMovies, ...allMovies, ...allMovies];
                renderMovieTrack(trackLeft, duplicatedMovies);
                renderMovieTrack(trackRight, duplicatedMovies);
                
                setTimeout(() => {
                    initDragScroll(scrollContainerLeft, trackLeft);
                    initDragScroll(scrollContainerRight, trackRight);
                }, 100);
                
                return;
            }

            isSearching = true;
            stopAllAnimations();

            const filteredMovies = allMovies.filter(movie => 
                movie.titulo.toLowerCase().includes(searchTerm)
            );
            
            if (filteredMovies.length > 0) {
                renderMovieTrack(trackLeft, filteredMovies);
                renderMovieTrack(trackRight, filteredMovies);
            } else {
                trackLeft.innerHTML = '<div class="no-results">Nenhum filme encontrado 🎬</div>';
                trackRight.innerHTML = '<div class="no-results">Nenhum filme encontrado 🎬</div>';
            }
            
            setTimeout(() => {
                initDragScroll(scrollContainerLeft, trackLeft);
                initDragScroll(scrollContainerRight, trackRight);
            }, 100);
        }

        let searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(searchMovies, 300);
        });

        // Carregar filmes ao iniciar
        loadMovies();
        setupPlayerControls();

        window.addEventListener('touchmove', function(e) {
            if (movieModal.style.display === 'flex' || playerModal.style.display === 'block') {
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('beforeunload', function() {
            if (animationTimeouts.left) {
                clearTimeout(animationTimeouts.left);
            }
            if (animationTimeouts.right) {
                clearTimeout(animationTimeouts.right);
            }
            if (headerTimeout) {
                clearTimeout(headerTimeout);
            }
        });

        window.addEventListener('resize', function() {
            if (movieModal.style.display === 'flex') {
                const movieId = allMovies.find(m => m.titulo === document.querySelector('.modal-title')?.textContent)?.id;
                if (movieId) {
                    showMovieDetails(movieId);
                }
            }
        });
    </script>
</body>
</html>
